# MediaMTX config for RTMP ingest.
# Runs RTMP on :1935 so OBS can connect to rtmp://34.46.51.228:1935/live.
# Uses MediaMTX HTTP auth to call the deployed SIL backend /rtmp/auth.

logLevel: info
logDestinations: [stdout]

# Use the deployed SIL backend as auth server (publish validation)
authMethod: http
authHTTPAddress: https://sil-api-308720634926.us-central1.run.app/rtmp/auth

api: true
apiAddress: :9997

metrics: false

# RTMP ingest for OBS
rtmp: true
rtmpAddress: :1935
rtmpEncryption: "no"

# SRT ingest for field encoders (LiveU / TVU / Larix)
srt: true
srtAddress: :9999

# Optional browser preview
hls: true
hlsAddress: :8888

webrtc: false

pathDefaults:
  runOnNotReady: >
    curl -s -X POST https://sil-api-308720634926.us-central1.run.app/rtmp/done
    -H "Content-Type: application/x-www-form-urlencoded"
    -d "name=$MTX_PATH"

paths:
  all_others:
    sourceOnDemand: false
